services:
  cable-drum:
    build: .
    ports:
      - "3041:3040"
    environment:
      - PORT=3040
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - HOSTINGER_WEBHOOK_URL=${HOSTINGER_WEBHOOK_URL}
    volumes:
      - drum_data:/app/data
      - drum_uploads:/app/uploads
    labels:
      - "traefik.enable=false"
    restart: unless-stopped

volumes:
  drum_data:
  drum_uploads:
