services:
  cable-drum:
    build: .
    ports:
      - "3041:3040"
    environment:
      - PORT=3040
      - GITHUB_TOKEN=***
      - HOSTINGER_WEBHOOK_URL=${HOSTINGER_WEBHOOK_URL}
      - NEXTCLOUD_URL=https://cloud.astelecgroup.com.au
      - NEXTCLOUD_USER=chloe@astelecgroup.com.au
      - NEXTCLOUD_TOKEN=${NEXTCLOUD_TOKEN}
      - NEXTCLOUD_BACKUP_PATH=Cable Drum Register Backups
    volumes:
      - drum_data:/app/data
      - drum_uploads:/app/uploads
    restart: unless-stopped

volumes:
  drum_data:
  drum_uploads: